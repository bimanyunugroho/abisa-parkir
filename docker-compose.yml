services:
    # ─── PHP-FPM ──────────────────────────────────────────────────────
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: siparkir_app
        restart: unless-stopped
        volumes:
            - .:/var/www/html
        networks:
            - siparkir_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    # ─── Nginx ────────────────────────────────────────────────────────
    nginx:
        image: nginx:alpine
        container_name: siparkir_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - siparkir_network
        depends_on:
            - app

    # ─── PostgreSQL ───────────────────────────────────────────────────
    postgres:
        image: postgres:16-alpine
        container_name: siparkir_postgres
        restart: unless-stopped
        ports:
            - "5433:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - siparkir_network

    # ─── Redis ────────────────────────────────────────────────────────
    redis:
        image: redis:7-alpine
        container_name: siparkir_redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        networks:
            - siparkir_network

    # ─── Queue Worker ─────────────────────────────────────────────────
    queue:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: siparkir_queue
        restart: unless-stopped
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        volumes:
            - .:/var/www/html
        networks:
            - siparkir_network
        depends_on:
            postgres:
                condition: service_healthy

    # ─── Scheduler ────────────────────────────────────────────────────
    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: siparkir_scheduler
        restart: unless-stopped
        command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
        volumes:
            - .:/var/www/html
        networks:
            - siparkir_network
        depends_on:
            postgres:
                condition: service_healthy

    # ─── Vite (dev only) ──────────────────────────────────────────────
    vite:
        image: node:20-alpine
        container_name: siparkir_vite
        working_dir: /var/www/html
        command: sh -c "npm ci && npm run dev -- --host"
        ports:
            - "5173:5173"
        volumes:
            - .:/var/www/html
            - /var/www/html/node_modules
        networks:
            - siparkir_network
        profiles:
            - dev

networks:
    siparkir_network:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
